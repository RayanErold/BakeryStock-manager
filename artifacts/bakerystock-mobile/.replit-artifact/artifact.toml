kind = "mobile"
previewPath = "/mobile/"
title = "BakeryStock Mobile"
version = "1.0.0"
id = "artifacts/bakerystock-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 20508

[services.development]
run = "pnpm --filter @workspace/bakerystock-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bakerystock-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/bakerystock-mobile", "run", "serve" ]

[services.env]
PORT = "20508"
BASE_PATH = "/mobile/"
